name: hw
description: "Auth"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">3.3.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.3
  dotted_border: ^3.1.0
  image_picker: ^1.2.1
  flutter_bloc: ^9.1.1
  intl: 0.20.2
  dio: ^5.9.2
  image: ^4.1.3
  cached_network_image: ^3.4.1
  hive_flutter: ^1.1.0
  connectivity_plus: ^7.1.1
  rive: 0.14.0-dev.8
  path_provider: ^2.1.2
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/default.png
    - assets/images/default-user.png
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/model/
